version: '3.8'

services:
  ml-service:
    build:
      context: ..
      dockerfile: docker/dockerfile
    container_name: detector_inference
    ports:
      - "${ML_SERVICE_PORT:-6050}:6050"
    volumes:
      - "${MODELS_DIR:?Set MODELS_DIR in .env}:/datasets:ro"
      - "${MODELS_DIR}:/models:ro"
      - "${MODELS_DIR}:/ml-service_models:ro"
      - ../app/model_config.json:/app/app/model_config.json:ro
      - "${DATA_DB_DIR:?Set DATA_DB_DIR in .env}:/data/db:ro"
      - ultralytics_config:/root/.config/Ultralytics
    environment:
      - PYTHONPATH=/app
    command: python3 -m app.main --host 0.0.0.0 --port 6050 --device ${DEVICE:-cuda} --workers ${WORKERS:-4}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${GPU_ID:-0}']
              capabilities: [gpu]
          memory: '32G'
    shm_size: '16G'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6050/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    labels:
      - autoheal=true
    networks:
      - shared_net

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: detector_inference_autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=90
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  shared_net:
    external: true

volumes:
  ultralytics_config:
