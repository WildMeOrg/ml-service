services:
  ml-service:
    build:
      context: ..
      dockerfile: docker/dockerfile
    container_name: ml-service
    ports:
      - "${ML_SERVICE_PORT:-6050}:6050"
    volumes:
      # Model weights directory — referenced as /models/ in model_config.json
      # Also mounted at /datasets/ for backward compatibility with existing configs
      - "${MODELS_DIR:?Set MODELS_DIR in .env}:/models:ro"
      - "${MODELS_DIR}:/datasets:ro"
      # Model config — edit to match your deployed models
      - ../app/model_config.json:/app/app/model_config.json:ro
      # Optional: share image paths with WBIA/Wildbook so image_uuid_list paths resolve
      # Set DATA_DB_DIR in .env to enable; omit or leave empty to skip
      - "${DATA_DB_DIR:-/tmp}:/data/db:ro"
      # Ultralytics cache (avoids re-downloading on restart)
      - ultralytics_config:/root/.config/Ultralytics
    environment:
      - PYTHONPATH=/app
    command: >
      python3 -m app.main
      --host 0.0.0.0
      --port 6050
      --device ${DEVICE:-cuda}
      --workers ${WORKERS:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${GPU_ID:-0}']
              capabilities: [gpu]
    shm_size: '2G'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6050/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s

volumes:
  ultralytics_config:
